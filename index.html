<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            margin: 0;
        }
        /* Cache les questions par défaut */
        .question-page {
            display: none;
        }
        /* Affiche uniquement la question active */
        .question-page.active {
            display: block;
        }
        input[type="radio"]:checked {
            accent-color: black;
        }
        .navigation {
            margin-top: 30px;
        }
        .nav-btn {
            background-color: white;
            color: black;
            border: 1px solid black;
            padding: 5px 15px;
            font-size: 18px;
            cursor: pointer;
            margin-right: 10px;
        }
        .submit-btn {
            background-color: black;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Test femboy</h1>

    <form id="quizForm">
        <div class="question-page active" id="page1">
            <p>1. Tu aime les jupes ?</p>
            <input type="radio" id="q1_yes" name="q1" value="yes" onclick="nextPageWithDelay()">
            <label for="q1_yes">Oui</label>
            <input type="radio" id="q1_no" name="q1" value="no" onclick="nextPageWithDelay()">
            <label for="q1_no">Non</label>
        </div>

        <div class="question-page" id="page2">
            <p>2. Tu met du vernis des foit ?</p>
            <input type="radio" id="q2_yes" name="q2" value="yes" onclick="nextPageWithDelay()">
            <label for="q2_yes">Oui</label>
            <input type="radio" id="q2_no" name="q2" value="no" onclick="nextPageWithDelay()">
            <label for="q2_no">Non</label>
        </div>

        <div class="question-page" id="page3">
            <p>3. est tu gay? ?</p>
            <input type="radio" id="q3_yes" name="q3" value="yes" onclick="nextPageWithDelay()">
            <label for="q3_yes">Oui</label>
            <input type="radio" id="q3_no" name="q3" value="no" onclick="this.checked = false; document.getElementById('q3_yes').checked = true; nextPageWithDelay();">
            <label for="q3_no">Non</label>
        </div>

        <div class="question-page" id="page4">
            <p>4. Tu boit de la monster ?</p>
            <input type="radio" id="q4_yes" name="q4" value="yes" onclick="nextPageWithDelay()">
            <label for="q4_yes">Oui</label>
            <input type="radio" id="q4_no" name="q4" value="no" onclick="nextPageWithDelay()">
            <label for="q4_no">Non</label>
        </div>

        <div class="question-page" id="page5">
            <p>5. tu te maquille ?</p>
            <input type="radio" id="q5_yes" name="q5" value="yes" onclick="nextPageWithDelay()">
            <label for="q5_yes">Oui</label>
            <input type="radio" id="q5_no" name="q5" value="no" onclick="nextPageWithDelay()">
            <label for="q5_no">Non</label>
        </div>
        
        <div class="question-page" id="page6">
            <p>6. tu te costplay ?</p>
            <input type="radio" id="q6_yes" name="q6" value="yes" onclick="showSubmitButton()">
            <label for="q6_yes">Oui</label>
            <input type="radio" id="q6_no" name="q6" value="no" onclick="showSubmitButton()">
            <label for="q6_no">Non</label>
            
            <br>
            <button type="button" id="btn-resultat" class="submit-btn" style="display: none;" onclick="document.getElementById('resultat').innerText = 'Resultat : Tu es 100% un femboy.'">Voir le resultat</button>
        </div>

        <div class="navigation">
            <button type="button" class="nav-btn" onclick="navigate(-1)">←</button>
            <button type="button" class="nav-btn" onclick="navigate(1)">→</button>
        </div>
        
        <p id="resultat" style="font-weight: bold; margin-top: 20px; font-size: 18px;"></p>
    </form>

    <script>
        let currentPage = 1;
        const totalPages = 6;
        let timeoutId = null;

        function showPage(pageNumber) {
            // Désactive toutes les pages
            document.querySelectorAll('.question-page').forEach(page => {
                page.classList.remove('active');
            });
            // Active la bonne page
            document.getElementById('page' + pageNumber).classList.add('active');
            currentPage = pageNumber;
        }

        function navigate(direction) {
            // Annule le changement automatique si on clique manuellement sur une flèche
            if (timeoutId) clearTimeout(timeoutId);
            
            let targetPage = currentPage + direction;
            if (targetPage >= 1 && targetPage <= totalPages) {
                showPage(targetPage);
            }
        }

        function nextPageWithDelay() {
            // Évite de lancer plusieurs timers en même temps
            if (timeoutId) clearTimeout(timeoutId);

            // Attend 1000 millisecondes (1 seconde) avant de passer à la suite
            timeoutId = setTimeout(() => {
                if (currentPage < totalPages) {
                    showPage(currentPage + 1);
                }
            }, 1000);
        }

        function showSubmitButton() {
            // Pour la dernière question, on affiche juste le bouton final après 1 seconde
            setTimeout(() => {
                document.getElementById('btn-resultat').style.display = 'block';
            }, 1000);
        }
    </script>

</body>
</html>
